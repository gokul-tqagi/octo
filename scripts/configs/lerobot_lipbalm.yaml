# lerobot_lipbalm.yaml: Config for converting ALOHA lipbalm pick data to RLDS.
# 60 episodes across 3 recording sessions, right arm only.

record_dirs:
  - /data/aloha/mobileai-lipbalm
  - /data/aloha/mobileai-lipbalm1
  - /data/aloha/mobileai-lipbalm2

output_dir: /data/rlds_output
dataset_name: aloha_lipbalm_pick
language_instruction: "pick up the lip balm"

# Right arm only (left arm is stationary).
active_arm: right
left_arm_indices: [0, 1, 2, 3, 4, 5, 6]
right_arm_indices: [7, 8, 9, 10, 11, 12, 13]
base_vel_indices: []
include_base_vel: false

# FK conversion: joint positions -> delta EEF actions (7-dim)
action_mode: delta_eef
fk_joint_indices: [0, 1, 2, 3, 4, 5]
gripper_index: 6
fk_include_mount: false

# Cameras: overhead + right wrist
primary_camera: cam_high
wrist_camera: cam_right_wrist
primary_size: [256, 256]
wrist_size: [128, 128]

# 30 FPS -> 5 Hz (stride=6)
target_hz: 5.0
original_fps: 30

val_ratio: 0.1
