# finetune_marker_pick.yaml: Octo-Small head_only finetune for ALOHA marker pick task.
# 74 episodes (~26k frames raw, ~4.3k at 5Hz) — head_only is appropriate.

# Model
pretrained_path: "hf://rail-berkeley/octo-small-1.5"

# Data (output of lerobot_marker_pick.yaml conversion)
data_dir: "/data/skills.trainer_cache"
dataset_name: "aloha_marker_pick"

# Checkpoints
save_dir: "/data/checkpoints/marker_pick_head_only"

# Training
batch_size: 32
num_steps: 20000
learning_rate: 1.0e-4
action_horizon: 4
window_size: 1

# Head-only: freeze transformer backbone, train action head + readout only
freeze_transformer: true

# Logging
log_interval: 100
save_interval: 2000
wandb: false
